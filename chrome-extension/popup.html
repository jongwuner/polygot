<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="popup.css">
</head>
<body>
<div class="container">
  <header>
    <div class="logo">Polyglot</div>
    <div class="subtitle">Translate and queue for Obsidian</div>
  </header>

  <!-- Translation Direction -->
  <div class="section">
    <label class="label">Translation</label>
    <div class="direction-row">
      <select id="sourceLang" class="lang-select">
        <option value="auto">Auto Detect</option>
        <option value="ko">한국어</option>
        <option value="en">English</option>
        <option value="jp">日本語</option>
        <option value="cn">中文</option>
        <option value="de">Deutsch</option>
      </select>
      <span class="arrow">→</span>
      <select id="targetLang" class="lang-select">
        <option value="ko">한국어</option>
        <option value="en">English</option>
        <option value="jp">日本語</option>
        <option value="cn">中文</option>
        <option value="de">Deutsch</option>
      </select>
      <button class="swap-btn" id="swapBtn" title="Swap">⇄</button>
    </div>
  </div>

  <!-- Quick Translate -->
  <div class="section">
    <label class="label">Quick Translate</label>
    <textarea id="inputText" class="input-area" placeholder="번역할 텍스트 입력..." rows="3"></textarea>
    <div class="result-area" id="resultArea"></div>
    <button class="btn primary full" id="translateBtn">Translate</button>
  </div>

  <hr class="divider">

  <!-- Obsidian Settings -->
  <div class="section">
    <label class="label">Obsidian Vault Name</label>
    <input type="text" id="vaultName" class="text-input" placeholder="e.g. MyVault">
  </div>

  <div class="section">
    <label class="label">Archive Base Path</label>
    <input type="text" id="archiveBase" class="text-input" placeholder="e.g. 4. Archive" value="4. Archive">
  </div>

  <div class="section">
    <label class="label">Save to Folder</label>
    <select id="archiveLang" class="lang-select full">
      <option value="auto">Auto (소스 언어 기준)</option>
      <option value="영어">영어</option>
      <option value="일본어">일본어</option>
      <option value="중국어">중국어</option>
      <option value="독일어">독일어</option>
      <option value="한국어">한국어</option>
    </select>
    <div class="path-preview" id="pathPreview"></div>
  </div>

  <button class="btn save full" id="saveSettings">Save Settings</button>

  <div class="section">
    <label class="label">Pending Queue</label>
    <div class="queue-card">
      <div class="queue-count" id="queueCount">0 queued</div>
      <div class="queue-preview" id="queuePreview">Queue is empty.</div>
    </div>
    <div class="queue-actions">
      <button class="btn" id="flushOneBtn">Save Next</button>
      <button class="btn save" id="flushAllBtn">Save All</button>
      <button class="btn" id="clearQueueBtn">Clear</button>
    </div>
  </div>

  <div class="shortcut-hint">
    <kbd>Alt</kbd> + <kbd>T</kbd> &nbsp; Translate + Queue
  </div>
</div>
<script src="obsidian.js"></script>
<script src="popup.js"></script>
</body>
</html>
